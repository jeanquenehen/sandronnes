<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sandronnes</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container de Login */
        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 { margin-bottom: 30px; color: var(--primary-color); }

        .input-group { margin-bottom: 20px; text-align: left; }

        input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #27ae60; }

        /* Estilização do seu Numbers Strip */
        .numbers-strip { background: #000; padding: 40px 0; border-top: 1px solid #333; }
        .numbers-inner { display: flex; justify-content: space-around; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .number-item { text-align: center; padding: 10px; }
        .number-val { font-size: 2.5rem; font-weight: bold; color: var(--primary-color); }
        .number-label { font-size: 0.9rem; color: #888; text-transform: uppercase; margin-top: 5px; }
        .ndiv { width: 1px; background: #333; height: 50px; align-self: center; }

        @media (max-width: 768px) {
            .ndiv { display: none; }
            .numbers-inner { flex-direction: column; }
        }
    </style>
</head>
<body>

    <section class="login-container">
        <div class="login-card">
            <h2>Sandronnes</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="E-mail de acesso" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            <button onclick="fazerLogin()">ACESSAR</button>
        </div>
    </section>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            try {
                // Envia as credenciais de forma segura para o servidor Node.js local
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // O cookie seguro foi injetado pelo Node, agora redirecionamos para a rota protegida
                    window.location.href = result.redirect;
                } else {
                    // Trata mensagens de erro retornadas pelo servidor Express
                    alert(result.message || 'Erro ao tentar acessar. Verifique suas credenciais.');
                }

            } catch (error) {
                console.error('Erro de autenticação no cliente:', error);
                alert('Não foi possível conectar ao servidor de autenticação.');
            }
        }

        // Tenta checar de forma silenciosa se o usuário já possui sessão ao carregar a página
        async function verificarSessaoAtiva() {
            try {
                // Ao tentar acessar a rota do sistema, se o cookie já for válido,
                // o servidor aceitará e o navegador mudará de página automaticamente.
                const resposta = await fetch('/sistema', { method: 'GET', redirect: 'follow' });
                if (resposta.redirected) {
                    // Se o servidor redirecionar de volta para o manager.html, significa que não está logado
                    if (!resposta.url.includes('manager.html')) {
                        window.location.href = resposta.url;
                    }
                }
            } catch (e) {
                console.log('Nenhuma sessão anterior ativa ativa.');
            }
        }
        
        // Removemos a verificação pesada do cliente, delegando a responsabilidade de proteção ao servidor Express.
    </script>
</body>
</html>
