<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sandronnes</title>
    <!-- Importação do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2ecc71;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
        }

        header {
            background: #000;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome-card, .form-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
        }

        .btn-logout {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        h1, h2 { color: var(--primary-color); margin-top: 0; }

        /* Estilos do Formulário */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }
        .btn-save {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .numbers-strip { background: #000; padding: 40px 0; border-top: 1px solid #333; margin-top: 50px; }
        .numbers-inner { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .number-item { text-align: center; }
        .number-val { font-size: 2rem; font-weight: bold; color: var(--primary-color); }
        .number-label { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.5rem; font-weight: bold;">SANDRONNES</div>
        <button class="btn-logout" onclick="logout()">Sair</button>
    </header>

    <div class="container">
        <div class="welcome-card">
            <h1>Painel de Controle</h1>
            <p>Olá, <span id="user-email">...</span></p>
        </div>

        <!-- FORMULÁRIO DE CADASTRO DE USUÁRIO -->
        <div class="form-card">
            <h2>Cadastrar Novo Usuário</h2>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="novo-nome" placeholder="Ex: João Silva">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="novo-email" placeholder="usuario@sandronnes.com.br">
            </div>
            <div class="form-group">
                <label>Senha Provisória</label>
                <input type="password" id="novo-password" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label>Perfil de Acesso</label>
                <select id="novo-perfil">
                    <option value="operador">Operador</option>
                    <option value="socio">Sócio</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button class="btn-save" onclick="salvarUsuario()">CADASTRAR USUÁRIO</button>
        </div>
    </div>

    <section class="numbers-strip">
        <div class="numbers-inner">
            <div class="number-item"><div class="number-val">98%</div><div class="number-label">Precisão</div></div>
            <div class="number-item"><div class="number-val">3×</div><div class="number-label">Velocidade</div></div>
            <div class="number-item"><div class="number-val">↓40%</div><div class="number-label">Insumos</div></div>
            <div class="number-item"><div class="number-val">100%</div><div class="number-label">Rastreável</div></div>
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://db.pastordistrital.com.br';
        const SUPABASE_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc2NDgxMDEyMCwiZXhwIjo0OTIwNDgzNzIwLCJyb2xlIjoiYW5vbiJ9.CwEayiY4c8K8xpkRUFVuAVm_iBmLXB09LzaZp9L9zTc';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            db: { schema: 'Sandronnes' }
        });

        async function checkSession() {
            const { data: { session }, error } = await _supabase.auth.getSession();
            if (error || !session) {
                window.location.href = 'manager.html';
            } else {
                document.getElementById('user-email').innerText = session.user.email;
            }
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'manager.html';
        }

        // FUNÇÃO PARA SALVAR NOVO USUÁRIO
        async function salvarUsuario() {
            const nome = document.getElementById('novo-nome').value;
            const email = document.getElementById('novo-email').value;
            const password = document.getElementById('novo-password').value;
            const perfil = document.getElementById('novo-perfil').value;

            if (!nome || !email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            try {
                // 1. Cria o usuário no Auth
                const { data: authData, error: authError } = await _supabase.auth.signUp({
                    email,
                    password
                });

                if (authError) throw authError;

                // 2. Insere os dados adicionais na tabela do schema Sandronnes
                const { error: dbError } = await _supabase
                    .from('usuarios')
                    .insert({
                        id: authData.user.id,
                        nome: nome,
                        perfil: perfil
                    });

                if (dbError) throw dbError;

                alert('Usuário ' + nome + ' cadastrado com sucesso!');
                
                // Limpa os campos
                document.getElementById('novo-nome').value = '';
                document.getElementById('novo-email').value = '';
                document.getElementById('novo-password').value = '';

            } catch (error) {
                console.error('Erro:', error.message);
                alert('Erro ao cadastrar: ' + error.message);
            }
        }

        checkSession();
    </script>
</body>
</html>
